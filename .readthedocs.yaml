# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  commands:
    # 安装 Python 依赖
    - pip install -r requirements.txt

    # 生成 HTML
    - sphinx-build -b html source $READTHEDOCS_OUTPUT/html

    # 生成 LaTeX 源文件
    - sphinx-build -b latex source _build/latex

    # 编译 PDF（注意 && 连接）
    - cd _build/latex && latexmk -r latexmkrc -pdf -f -dvi- -ps- -jobname=kargo-manual -interaction=nonstopmode KargoManual.tex

    # 复制 PDF 到输出目录
    - mkdir -p $READTHEDOCS_OUTPUT/pdf
    - cp _build/latex/kargo-manual.pdf $READTHEDOCS_OUTPUT/pdf/

# 同时保留 sphinx 配置（作为元数据，不会干扰自定义命令）
sphinx:
  configuration: source/conf.py

python:
   install:
     - requirements: requirements.txt