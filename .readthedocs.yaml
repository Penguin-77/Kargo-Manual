version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - fonts-noto-cjk
    - fonts-noto-cjk-extra
    - texlive-lang-chinese
    - texlive-xetex
    - texlive-latex-extra
    - latexmk
    - librsvg2-bin

python:
  install:
    - requirements: requirements.txt

sphinx:
  configuration: source/conf.py